spring.application.name=Fifa

# H2 In-Memory Database (local dev)
spring.datasource.url=jdbc:h2:mem:fifadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT
app.jwt.secret=YourSuperSecretKeyForJWTTokenGenerationMustBeLongEnough256Bits!!
app.jwt.expiration-ms=86400000

# Football Data API
app.football-api.token=9eed3a122bdc4af49f52d111896901fa

# API-Football (api-sports.io) for goal scorers
app.api-football.key=

# Server
server.port=8085
spring.jackson.time-zone=Asia/Kolkata

# Logging to file
logging.file.name=logs/fifa-app.log
logging.level.com.fifaworldcup=INFO
